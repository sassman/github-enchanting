<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#2d333b"/>
      <stop offset="100%" stop-color="#1c2128"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="64" cy="64" r="62" fill="url(#bg)"/>

  <!-- 5 tentacles spread underneath the body -->
  <!-- Left outer tentacle -->
  <path d="M30 78 Q18 88 16 98 Q15 104 20 102 Q24 100 26 94 Q28 88 34 82"
        fill="#c9d1d9" stroke="#adb5bd" stroke-width="0.5"/>
  <!-- Left inner tentacle -->
  <path d="M38 82 Q30 94 28 104 Q27 110 32 107 Q36 104 37 96 Q38 90 42 84"
        fill="#c9d1d9" stroke="#adb5bd" stroke-width="0.5"/>
  <!-- Center tentacle -->
  <path d="M48 86 Q46 98 48 108 Q49 113 52 109 Q54 104 53 96 Q52 90 52 86"
        fill="#c9d1d9" stroke="#adb5bd" stroke-width="0.5"/>
  <!-- Right inner tentacle -->
  <path d="M58 84 Q62 94 64 104 Q65 110 68 106 Q70 102 67 94 Q64 88 62 82"
        fill="#c9d1d9" stroke="#adb5bd" stroke-width="0.5"/>
  <!-- Right outer tentacle (holds wand, curves up-right) -->
  <path d="M68 78 Q76 82 82 78 Q88 74 90 68 Q91 64 88 66 Q84 70 80 74 Q74 78 70 80"
        fill="#c9d1d9" stroke="#adb5bd" stroke-width="0.5"/>

  <!-- Body — rounded, slightly wider than tall -->
  <ellipse cx="50" cy="72" rx="28" ry="20" fill="#c9d1d9"/>

  <!-- Head — large and round, overlapping the body -->
  <circle cx="50" cy="46" r="24" fill="#c9d1d9"/>

  <!-- Left ear -->
  <path d="M28 30 L22 8 L40 24 Z" fill="#c9d1d9"/>
  <path d="M30 28 L25 14 L38 24 Z" fill="#a0a8b2"/>

  <!-- Right ear -->
  <path d="M72 30 L78 8 L60 24 Z" fill="#c9d1d9"/>
  <path d="M70 28 L75 14 L62 24 Z" fill="#a0a8b2"/>

  <!-- Eyes — large, oval, characteristic Octocat style -->
  <ellipse cx="40" cy="44" rx="7" ry="9" fill="#fff"/>
  <ellipse cx="60" cy="44" rx="7" ry="9" fill="#fff"/>
  <!-- Pupils -->
  <ellipse cx="42" cy="45" rx="4" ry="5.5" fill="#24292f"/>
  <ellipse cx="62" cy="45" rx="4" ry="5.5" fill="#24292f"/>
  <!-- Eye highlights -->
  <ellipse cx="43.5" cy="42" rx="1.8" ry="2.2" fill="#fff"/>
  <ellipse cx="63.5" cy="42" rx="1.8" ry="2.2" fill="#fff"/>

  <!-- Nose -->
  <ellipse cx="50" cy="53" rx="2.5" ry="1.5" fill="#a0a8b2"/>

  <!-- Mouth — gentle smile -->
  <path d="M44 56 Q50 61 56 56" stroke="#6e7681" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Wizard wand (held by right outer tentacle) -->
  <line x1="86" y1="70" x2="104" y2="18" stroke="#6b4c11" stroke-width="3" stroke-linecap="round"/>
  <!-- Wand handle detail -->
  <line x1="86" y1="70" x2="89" y2="60" stroke="#8b6914" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Wand star at tip — 4-pointed -->
  <path d="M104 18 L106 10 L108 18 L116 20 L108 22 L106 30 L104 22 L96 20 Z" fill="#fbbf24"/>
  <path d="M104 18 L105.5 13 L107 18 L112 19.5 L107 21 L105.5 26 L104 21 L99 19.5 Z" fill="#fde68a"/>

  <!-- Sparkles around wand tip -->
  <circle cx="98" cy="12" r="1.5" fill="#fbbf24" opacity="0.9"/>
  <circle cx="114" cy="14" r="1.2" fill="#fbbf24" opacity="0.8"/>
  <circle cx="112" cy="28" r="1" fill="#fbbf24" opacity="0.7"/>
  <circle cx="96" cy="24" r="1.3" fill="#fbbf24" opacity="0.6"/>
  <!-- Small star sparkles -->
  <path d="M93 16 L94 14 L95 16 L97 17 L95 18 L94 20 L93 18 L91 17 Z" fill="#fde68a" opacity="0.7"/>
  <path d="M116 24 L117 22.5 L118 24 L119.5 25 L118 26 L117 27.5 L116 26 L114.5 25 Z" fill="#fde68a" opacity="0.6"/>
</svg>
